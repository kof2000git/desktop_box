name: Build

# 触发:push 到 main(产出 artifact 供测试)、打 v* tag(创建 Release)、手动
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # 创建 Release 需要

jobs:
  build:
    runs-on: windows-latest   # 自带 MSVC(C++ 工具链)+ .NET 8 SDK
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test DesktopBox.sln -c Release

      # 自包含分散发布(exe + 运行时 DLL):与本地构建一致。
      # 不用单文件——单文件 exe 会把 .NET bundle 解压到 %TEMP%,DllImport 加载旁边的
      # 原生 ShellMenu.dll 时搜索路径不可靠,首次右键磁贴会 DllNotFoundException。
      - name: Publish .NET app (self-contained)
        run: dotnet publish src/DesktopBox/DesktopBox.csproj -c Release -r win-x64 --self-contained true -o publish

      # 原生 C++ 右键菜单宿主:用 build_dll.bat(vswhere 定位 MSVC → cl 编译),
      # 输出 DesktopBox.ShellMenu.dll 到 publish/。
      - name: Build native ShellMenu.dll
        shell: cmd
        run: src\DesktopBox.ShellMenu\build_dll.bat

      # 打包整个 publish 目录(exe + 所有运行时 DLL + ShellMenu.dll),解压即用
      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path publish/* -DestinationPath DesktopBox.zip

      # 每次构建都上传 artifact(非 tag 时供下载测试,7 天过期)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopBox
          path: DesktopBox.zip

      # 打 tag 时创建公开 Release,附带 zip
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DesktopBox.zip
          generate_release_notes: true
