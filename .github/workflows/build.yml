name: Build

# 触发:push 到 main(产出 artifact 供测试)、打 v* tag(创建 Release)、手动
on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write   # 创建 Release 需要

jobs:
  build:
    runs-on: windows-latest   # 自带 MSVC(C++ 工具链)+ .NET 8 SDK
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Test
        run: dotnet test DesktopBox.sln -c Release

      # 自包含单文件发布:与 release.ps1 保持一致。
      # 产物只保留 DesktopBox.exe + 原生 ShellMenu.dll,避免发布包里出现大量 .NET 运行时 DLL。
      - name: Publish .NET app (single-file self-contained)
        run: >
          dotnet publish src/DesktopBox/DesktopBox.csproj
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -o publish

      # 原生 C++ 右键菜单宿主:用 build_dll.bat(vswhere 定位 MSVC → cl 编译),
      # 输出 DesktopBox.ShellMenu.dll 到 publish/。
      - name: Build native ShellMenu.dll
        shell: cmd
        run: src\DesktopBox.ShellMenu\build_dll.bat

      # 打包单文件 exe + ShellMenu.dll,解压即用
      - name: Package zip
        shell: pwsh
        run: Compress-Archive -Path publish/DesktopBox.exe,publish/DesktopBox.ShellMenu.dll -DestinationPath DesktopBox.zip

      # 每次构建都上传 artifact(非 tag 时供下载测试,7 天过期)
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DesktopBox
          path: DesktopBox.zip

      # 打 tag 时创建公开 Release,附带 zip
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: DesktopBox.zip
          generate_release_notes: true
